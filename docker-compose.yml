version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - USE_BEDROCK=${USE_BEDROCK:-true}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_PRIMARY_MODEL=${BEDROCK_PRIMARY_MODEL:-us.anthropic.claude-sonnet-4-5-20250514-v1:0}
      - S3_BUCKET=${S3_BUCKET}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
